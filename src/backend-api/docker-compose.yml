services:
  postgres:
    image: postgres:16
    container_name: ticketbox-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ticketbox
      POSTGRES_PASSWORD: ticketbox123
      POSTGRES_DB: ticketbox

    ports:
      - "5433:5432"

    volumes:
      - ticketbox_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ticketbox -d ticketbox" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ticketbox_postgres_data:
