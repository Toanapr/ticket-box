services:
  postgres:
    image: postgres:16
    container_name: ticketbox-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ticketbox
      POSTGRES_PASSWORD: ticketbox123
      POSTGRES_DB: ticketbox

    ports:
      - "5433:5432"

    volumes:
      - ticketbox_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ticketbox -d ticketbox" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ticketbox-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ticketbox-rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ticketbox
      RABBITMQ_DEFAULT_PASS: ticketbox123

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - ticketbox_rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ticketbox-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ticketbox
      MINIO_ROOT_PASSWORD: ticketbox123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - ticketbox_minio_data:/data

    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ticketbox_postgres_data:
  ticketbox_rabbitmq_data:
  ticketbox_minio_data:
